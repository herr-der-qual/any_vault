services:
  database:
    image: postgres:15
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: database
      POSTGRES_PORT: 5432
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - network_dev

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.dev
    volumes:
      - ./backend:/app
    command: /bin/bash /app/entrypoint.dev.sh
    environment:
      DEBUG: "True"
      SECRET_KEY: dev_secret_key_not_for_production_12345
      DJANGO_SETTINGS_MODULE: config.settings_dev

      ALLOWED_HOSTS: "*"
      CSRF_TRUSTED_ORIGINS: "http://localhost:3020,http://localhost:8020,http://127.0.0.1:3020,http://127.0.0.1:8020"
      CORS_ALLOWED_ORIGINS: "http://localhost:3020,http://localhost:8020,http://127.0.0.1:3020,http://127.0.0.1:8020"
      SITE_URL: http://localhost:3020

      DB_NAME: postgres
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: database
      DB_PORT: 5432

      DJANGO_SUPERUSER_USERNAME: admin
      DJANGO_SUPERUSER_EMAIL: admin@example.com
      DJANGO_SUPERUSER_PASSWORD: admin
    ports:
      - "8020:8000"
    depends_on:
      database:
        condition: service_healthy
    networks:
      - network_dev

networks:
  network_dev:
    driver: bridge

volumes:
  postgres_data_dev:
