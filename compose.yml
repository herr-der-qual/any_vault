services:
  database:
    image: postgres:15-alpine
    container_name: anyvault_db
    restart: always
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - anyvault_network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: anyvault_backend
    restart: always
    environment:
      - DEBUG=${DEBUG}
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}

      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}

      - DJANGO_SETTINGS_MODULE=${DJANGO_SETTINGS_MODULE}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - SITE_URL=${SITE_URL}
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    depends_on:
      database:
        condition: service_healthy
    networks:
      - anyvault_network

  nginx:
    image: nginx:alpine
    container_name: anyvault_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt/live/any-vault.ru/fullchain.pem:/etc/nginx/ssl/fullchain.pem:ro
      - /etc/letsencrypt/live/any-vault.ru/privkey.pem:/etc/nginx/ssl/privkey.pem:ro
      - static_files:/static:ro
      - media_files:/media:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - anyvault_network

volumes:
  postgres_data:
  static_files:
  media_files:

networks:
  anyvault_network:
    driver: bridge